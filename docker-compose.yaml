version: '3.8'

services:

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  ondedoar:
    image: lucasgerman0/ondedoar-app-msb:latest
    container_name: java
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgresql
      REDIS_HOST: redis
    depends_on:
      postgresql:
        condition: service_healthy
volumes:
  postgresql-data: