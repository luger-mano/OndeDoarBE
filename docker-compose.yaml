version: '3.8'

services:
  postgresql:
    container_name: postgresql
    restart: always
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ondedoar14
      POSTGRES_USER: root
      POSTGRES_DB: ondedoar
    ports:
      - '5432:5432'
    volumes:
      - postgresql-data:/var/lib/postgresql
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
volumes:
  postgresql-data: