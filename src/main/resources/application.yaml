spring:

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
    encoding: UTF-8
    ignore-unsupported-database: true
    lock-retry-count: 10

  application:
    name: ondedoar

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  datasource:
     url: jdbc:postgresql://localhost:5432/ondedoar
     username: root
     password: ondedoar14
     driver-class-name: org.postgresql.Driver

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true


jwt:
  public:
    key: classpath:keys/my.key.pub
  private:
    key: classpath:keys/my.key.priv


